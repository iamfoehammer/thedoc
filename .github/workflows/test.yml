name: smoke-test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  smoke:
    name: setup.sh end-to-end (Ubuntu)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Show bash version
        run: bash --version

      - name: Verify setup.sh syntax
        run: bash -n setup.sh

      - name: Verify bootstrap.sh syntax
        run: bash -n bootstrap.sh

      - name: Verify thedoc wrapper syntax
        run: bash -n thedoc

      - name: Verify llm-secrets syntax
        run: bash -n llm-secrets

      - name: Verify all engine launcher syntax
        run: |
          for f in engines/*.sh; do
              echo "checking $f"
              bash -n "$f"
          done

      - name: Verify --help short-circuit (no preflight)
        run: |
          ./setup.sh --help    | grep -q "thedoc setup wizard"
          ./bootstrap.sh -h    | grep -q "thedoc bootstrap"

      - name: Run wrapper tests
        run: bash tests/test_wrapper.sh

      - name: Run smoke tests
        run: python3 tests/smoke_test.py

  smoke-macos:
    name: setup.sh end-to-end (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Show bash version (system)
        run: /bin/bash --version

      - name: Verify setup.sh syntax
        run: bash -n setup.sh

      - name: Verify bootstrap.sh syntax
        run: bash -n bootstrap.sh

      - name: Verify thedoc wrapper syntax
        run: bash -n thedoc

      - name: Verify llm-secrets syntax
        run: bash -n llm-secrets

      - name: Verify all engine launcher syntax
        run: |
          for f in engines/*.sh; do
              echo "checking $f"
              bash -n "$f"
          done

      - name: Verify --help short-circuit
        run: |
          ./setup.sh --help    | grep -q "thedoc setup wizard"
          ./bootstrap.sh -h    | grep -q "thedoc bootstrap"

      # macOS ships bash 3.2; this is the canonical test rig for the
      # BSD/coreutils portability work (no grep -P, no find -readable,
      # bash 3.2 array safety, BSD wc whitespace stripping, etc.).
      - name: Run wrapper tests
        run: bash tests/test_wrapper.sh

      - name: Run smoke tests
        run: python3 tests/smoke_test.py

  parse-powershell:
    # PowerShell-only parse check. The smoke test driver uses pty.fork()
    # which is Linux/macOS-only, so a real E2E run here would need a
    # separate PS-native driver - not yet built. For now this job at
    # least catches syntax errors in setup.ps1 / bootstrap.ps1 / engine
    # launchers that the bash-only jobs above can't see.
    name: setup.ps1 parse check (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Show PowerShell version
        shell: pwsh
        run: $PSVersionTable | Format-Table -AutoSize

      - name: Verify --help short-circuit (no preflight)
        shell: pwsh
        run: |
          # Mirrors the bash CI step: --help must exit cleanly with usage
          # info BEFORE the version/git preflight (which would otherwise
          # block running on misconfigured systems).
          $setup     = & .\setup.ps1     --help 2>&1 | Out-String
          $bootstrap = & .\bootstrap.ps1 --help 2>&1 | Out-String
          if ($setup -notmatch 'thedoc setup wizard') {
              Write-Error "setup.ps1 --help missing 'thedoc setup wizard'"
              exit 1
          }
          if ($bootstrap -notmatch 'thedoc bootstrap') {
              Write-Error "bootstrap.ps1 --help missing 'thedoc bootstrap'"
              exit 1
          }
          Write-Host 'Both --help short-circuits OK'

      - name: Parse-check all .ps1 files
        shell: pwsh
        run: |
          $files = Get-ChildItem -Recurse -File -Filter '*.ps1'
          $errors = @()
          foreach ($f in $files) {
              $tokens = $null
              $perr   = $null
              [System.Management.Automation.Language.Parser]::ParseFile(
                  $f.FullName, [ref]$tokens, [ref]$perr) | Out-Null
              if ($perr.Count -gt 0) {
                  Write-Host "FAIL: $($f.FullName)"
                  $perr | ForEach-Object { Write-Host "  $_" }
                  $errors += $f.FullName
              } else {
                  Write-Host "OK:   $($f.FullName)"
              }
          }
          if ($errors.Count -gt 0) {
              Write-Error "Parse errors in $($errors.Count) file(s)"
              exit 1
          }

      - name: Verify setup.ps1 defines the expected functions
        shell: pwsh
        run: |
          # Catches typos in function definitions (e.g. Get-Wrappped) that
          # parse-clean as just a different identifier. If a future commit
          # accidentally renames or removes one of these, the CI fails loud.
          $expected = @(
              'Test-FirstRun', 'Save-State', 'Get-State',
              'Get-Wrapped', 'Write-Typed', 'Wait-Dramatic',
              'Show-Greeting', 'Invoke-TricorderScan',
              'Show-Menu', 'Test-IsStub',
              'Read-Line', 'Get-ShortPath', 'Get-CandidateProjectDirs',
              'Get-ProjectsDir', 'Show-StructureExplainer',
              'New-DoctorInstance'
          )
          $tokens = $null; $perr = $null
          $ast = [System.Management.Automation.Language.Parser]::ParseFile(
              'setup.ps1', [ref]$tokens, [ref]$perr)
          $defined = $ast.FindAll(
              { param($n) $n -is [System.Management.Automation.Language.FunctionDefinitionAst] },
              $true) | ForEach-Object { $_.Name }
          $missing = $expected | Where-Object { $defined -notcontains $_ }
          if ($missing) {
              Write-Error "Missing or renamed functions in setup.ps1: $($missing -join ', ')"
              Write-Host "Defined: $($defined -join ', ')"
              exit 1
          }
          Write-Host "All $($expected.Count) expected functions present in setup.ps1"

      - name: Run thedoc.ps1 wrapper tests
        shell: pwsh
        run: pwsh -NoProfile -File tests/test_wrapper.ps1
