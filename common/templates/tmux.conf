# -- General --
set -g default-terminal "xterm-256color"
set -ga terminal-features ",xterm-256color:RGB"
set -g history-limit 10000
set -g escape-time 10

# -- Status bar at top --
set -g status-position top

# -- Make windows/tabs obvious --
set -g status-style "bg=green,fg=black"
set -g status-left " #S "
set -g status-left-length 20
set -g window-status-format "  #I: #W  "
set -g window-status-current-format "  #I: #W  "
set -g window-status-current-style "bg=colour236,fg=colour252,bold"
set -g window-status-style "bg=green,fg=black"
set -g window-status-separator "|"
set -g status-right " #H "
set -g status 2
set -g status-format[1] "#[align=left bg=yellow,fg=black] Select:drag  Copy/Paste:right-click  Shift+rclick:tmux buf  New tab:Ctrl-b c  Next:Ctrl-b n  Prev:Ctrl-b p  Detach:Ctrl-b d #[default]"

# -- Mouse --
set -g mouse on

# -- Clipboard (OSC 52 for terminals that support it) --
set -g set-clipboard on

# -- Copy mode: emacs keys (closer to Windows feel) --
set -g mode-keys emacs

# -- Drag selection stays visible (no auto-copy on release) --
bind -T copy-mode MouseDragEnd1Pane send-keys -X stop-selection
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X stop-selection

# -- Right-click behavior (WSL2) --
# In copy-mode with selection: copy selection to Windows clipboard, exit copy mode
# In root (no selection): paste from Windows clipboard
# Shift+right-click: paste from tmux's internal buffer (WSL side)
if-shell 'grep -qi microsoft /proc/version 2>/dev/null' \
    'bind -T copy-mode MouseDown3Pane send-keys -X copy-pipe-and-cancel "/mnt/c/Windows/System32/clip.exe" ; \
     bind -T copy-mode-vi MouseDown3Pane send-keys -X copy-pipe-and-cancel "/mnt/c/Windows/System32/clip.exe" ; \
     bind -T root MouseDown3Pane run-shell -b "/mnt/c/Windows/System32/WindowsPowerShell/v1.0/powershell.exe -NoProfile -Command Get-Clipboard | tr -d \"\\r\" | tmux load-buffer - && tmux paste-buffer -p" ; \
     bind -T root S-MouseDown3Pane paste-buffer' \
    'bind -T copy-mode MouseDown3Pane send-keys -X copy-pipe-and-cancel ; \
     bind -T copy-mode-vi MouseDown3Pane send-keys -X copy-pipe-and-cancel ; \
     bind -T root MouseDown3Pane paste-buffer'

# -- Middle-click = paste from Windows clipboard --
if-shell 'grep -qi microsoft /proc/version 2>/dev/null' \
    'bind -T root MouseDown2Pane run-shell -b "/mnt/c/Windows/System32/WindowsPowerShell/v1.0/powershell.exe -NoProfile -Command Get-Clipboard | tr -d \"\\r\" | tmux load-buffer - && tmux paste-buffer -p"' \
    'bind -T root MouseDown2Pane paste-buffer'

# -- Shift+Insert pastes from tmux buffer --
bind -T root S-IC paste-buffer

# -- Scroll wheel works naturally in copy mode --
bind -T copy-mode WheelUpPane send-keys -X scroll-up
bind -T copy-mode WheelDownPane send-keys -X scroll-down

# -- Double-click selects a word (stays visible, use right-click to copy) --
bind -T root DoubleClick1Pane select-pane -t = \; if -F "#{||:#{pane_in_mode},#{mouse_any_flag}}" { send-keys -M } { copy-mode -H; send-keys -X select-word }
bind -T root TripleClick1Pane select-pane -t = \; if -F "#{||:#{pane_in_mode},#{mouse_any_flag}}" { send-keys -M } { copy-mode -H; send-keys -X select-line }

# Tip: Hold SHIFT while dragging to use the terminal's own selection (bypasses tmux)
