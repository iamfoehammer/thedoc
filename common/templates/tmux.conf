# -- General --
set -g default-terminal "xterm-256color"
set -ga terminal-features ",xterm-256color:RGB"
set -g history-limit 10000
set -g escape-time 10

# -- Status bar at top --
set -g status-position top

# -- Make windows/tabs obvious --
set -g status-style "bg=green,fg=black"
set -g status-left " #S "
set -g status-left-length 20
set -g window-status-format "  #I: #W  "
set -g window-status-current-format "  #I: #W  "
set -g window-status-current-style "bg=colour236,fg=colour252,bold"
set -g window-status-style "bg=green,fg=black"
set -g window-status-separator "|"
set -g status-right " #H "
set -g status 2
set -g status-format[1] "#[align=left bg=yellow,fg=black] Copy:drag  Paste:right-click  New tab:Ctrl-b c  Next:Ctrl-b n  Prev:Ctrl-b p  Detach:Ctrl-b d  Rename:Ctrl-b , #[default]"

# -- Mouse --
set -g mouse on

# -- Clipboard (OSC 52) --
# "on" = set tmux buffer AND send OSC 52 to outer terminal (Windows clipboard)
set -g set-clipboard on

# -- Copy mode: emacs keys (closer to Windows feel) --
set -g mode-keys emacs

# -- Mouse drag auto-copies and exits copy mode --
# When you click-drag to select text and release, it copies to clipboard automatically
bind -T copy-mode MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel

# -- Right-click pastes from Windows clipboard (WSL2) --
# Falls back to tmux buffer on non-WSL systems
if-shell 'grep -qi microsoft /proc/version 2>/dev/null' \
    'bind -T root MouseDown3Pane run-shell -b "powershell.exe -NoProfile -Command Get-Clipboard | tr -d \"\\r\" | tmux load-buffer - && tmux paste-buffer -p"' \
    'bind -T root MouseDown3Pane paste-buffer'

# -- Middle-click pastes from Windows clipboard too --
if-shell 'grep -qi microsoft /proc/version 2>/dev/null' \
    'bind -T root MouseDown2Pane run-shell -b "powershell.exe -NoProfile -Command Get-Clipboard | tr -d \"\\r\" | tmux load-buffer - && tmux paste-buffer -p"' \
    'bind -T root MouseDown2Pane paste-buffer'

# -- Shift+Insert pastes (common Windows shortcut) --
bind -T root S-IC paste-buffer

# -- Scroll wheel works naturally in copy mode --
bind -T copy-mode WheelUpPane send-keys -X scroll-up
bind -T copy-mode WheelDownPane send-keys -X scroll-down

# -- Double-click selects a word, triple-click selects a line --
bind -T copy-mode DoubleClick1Pane select-pane \; send-keys -X select-word \; run-shell -d 0.3 \; send-keys -X copy-pipe-and-cancel
bind -T copy-mode TripleClick1Pane select-pane \; send-keys -X select-line \; run-shell -d 0.3 \; send-keys -X copy-pipe-and-cancel
bind -T root DoubleClick1Pane select-pane -t = \; if -F "#{||:#{pane_in_mode},#{mouse_any_flag}}" { send-keys -M } { copy-mode -H; send-keys -X select-word; run-shell -d 0.3; send-keys -X copy-pipe-and-cancel }
bind -T root TripleClick1Pane select-pane -t = \; if -F "#{||:#{pane_in_mode},#{mouse_any_flag}}" { send-keys -M } { copy-mode -H; send-keys -X select-line; run-shell -d 0.3; send-keys -X copy-pipe-and-cancel }

# -- Tip: Hold SHIFT while clicking/dragging to bypass tmux entirely --
# This uses your terminal's native selection and copies to Windows clipboard directly.
# Useful as a fallback if OSC 52 isn't working.
