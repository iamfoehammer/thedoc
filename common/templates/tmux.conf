# -- Terminal & colors --
set -g default-terminal "screen-256color"
set -sa terminal-overrides ",xterm*:Tc"

# -- Mouse --
set -g mouse on

# Disable alternate screen capture so the scroll wheel scrolls the
# terminal's own scrollback (like a normal shell) instead of sending
# arrow-key sequences to the running program.
set -ga terminal-overrides ',xterm*:smcup@:rmcup@'

# -- Copy / paste (WSL2 -> Windows clipboard) --
# Full paths required - WSL2 doesn't always have Windows binaries in PATH.
# If you're on native Linux or macOS, replace these with xclip/pbcopy equivalents.

# Keep selection visible after mouse drag (don't auto-copy, don't exit copy mode).
# User can then right-click to copy, or click elsewhere to cancel.
bind-key -T copy-mode MouseDragEnd1Pane send-keys -X stop-selection
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X stop-selection

# Right-click behavior:
# - If in copy mode (text is selected): copy selection to Windows clipboard, exit copy mode
# - If not in copy mode (nothing selected): paste from Windows clipboard
bind-key -T copy-mode MouseDown3Pane send-keys -X copy-pipe-and-cancel "/mnt/c/Windows/System32/clip.exe"
bind-key -T copy-mode-vi MouseDown3Pane send-keys -X copy-pipe-and-cancel "/mnt/c/Windows/System32/clip.exe"
bind-key -T root MouseDown3Pane run-shell -b "/mnt/c/Windows/System32/WindowsPowerShell/v1.0/powershell.exe -NoProfile -Command Get-Clipboard | tr -d '\\r' | tmux load-buffer - && tmux paste-buffer -p"

# -- Scrollback --
set -g history-limit 50000

# -- Responsiveness --
# Reduce escape delay so Esc doesn't feel laggy
set -s escape-time 10

# -- Quality of life --
# Start window numbering at 1 (easier to reach than 0)
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows when one is closed
set -g renumber-windows on

# Longer status messages
set -g display-time 2000
