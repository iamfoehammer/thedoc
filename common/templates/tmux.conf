# -- Terminal & colors --
set -g default-terminal "screen-256color"
set -sa terminal-overrides ",xterm*:Tc"

# -- Mouse --
set -g mouse on

# Disable alternate screen capture so the scroll wheel scrolls the
# terminal's own scrollback (like a normal shell) instead of sending
# arrow-key sequences to the running program.
set -ga terminal-overrides ',xterm*:smcup@:rmcup@'

# -- Copy / paste (WSL2 -> Windows clipboard) --
# Select with mouse drag -> auto-copies to Windows clipboard.
# Right-click pastes from Windows clipboard.
bind-key -T copy-mode MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "clip.exe"
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "clip.exe"

# Ctrl+Shift+V style paste (reads from Windows clipboard)
bind-key ] run-shell "powershell.exe -NoProfile -Command Get-Clipboard | head -c -1 | tmux load-buffer - && tmux paste-buffer"

# Right-click = paste from Windows clipboard
bind-key -T root MouseDown3Pane run-shell "powershell.exe -NoProfile -Command Get-Clipboard | head -c -1 | tmux load-buffer - && tmux paste-buffer"

# -- Scrollback --
set -g history-limit 50000

# -- Responsiveness --
# Reduce escape delay so Esc doesn't feel laggy
set -s escape-time 10

# -- Quality of life --
# Start window numbering at 1 (easier to reach than 0)
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows when one is closed
set -g renumber-windows on

# Longer status messages
set -g display-time 2000
